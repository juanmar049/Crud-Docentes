<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crud Docentes</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>


    <h1>Gestión de Docentes</h1>

<form id="formDocente">
    <select id="tipoDocumento">
        <option value="C.C">C.C</option>
        <option value="C.E">C.E</option>
        <option value="TI">TI</option>
        <option value="NIUP">NIUP</option>
    </select>

    <input type="text" id="nombre" placeholder="Nombre" required>
    <input type="text" id="apellido" placeholder="Apellido" required>
    <input type="date" id="fechaNacimiento" required>

    <select id="nivel">
        <option>Pregrado</option>
        <option>Maestría</option>
        <option>Doctorado</option>
    </select>

    <select id="area">
        <option>Matemáticas</option>
        <option>Ciencias</option>
        <option>Sistemas</option>
    </select>

    <select id="grado">
        <option>Primer Semestre</option>
        <option>Segundo Semestre</option>
        <option>Tercer Semestre</option>
        <option>Cuarto Semestre</option>
    </select>

    <input type="text" id="eps" placeholder="EPS" required>
    <input type="number" id="salario" placeholder="Salario" required>

    <button type="submit">Guardar</button>
</form>

<h2>Lista de Docentes</h2>
<table>
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Área</th>
            <th>Salario</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody id="tablaDocentes"></tbody>
</table>

<script src="javascript.js"></script>
</body>
</html>
